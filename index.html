<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Öffne Lolsu in Modrinth...</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            text-align: center;
            padding: 50px 20px;
            background-color: #1a1a1a;
            color: #ffffff;
        }
        .btn {
            display: inline-block;
            margin-top: 15px;
            padding: 12px 24px;
            background-color: #00af5c;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
        }
        .btn:hover {
            background-color: #008f4b;
        }
    </style>
</head>
<body>

    <div>
        <h2>Modrinth-App wird gestartet...</h2>
        <p>Falls sich die App nicht automatisch öffnet, klicke auf den Button:</p>
        <a href="modrinth://mod/lolsu" class="btn">Lolsu in Modrinth-App öffnen</a>
    </div>

    <script>
        // Leitet sofort direkt an die Modrinth-App weiter
        window.location.href = "modrinth://mod/lolsu";
    </script>
</body>
</html>
