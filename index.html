<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Öffne in Modrinth...</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            text-align: center;
            padding: 50px 20px;
            background-color: #1a1a1a;
            color: #ffffff;
        }
        .btn {
            display: inline-block;
            margin-top: 15px;
            padding: 12px 24px;
            background-color: #00af5c;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
        }
        .btn:hover {
            background-color: #008f4b;
        }
    </style>
</head>
<body>

    <div id="content">
        <h2>Modrinth-App wird gestartet...</h2>
        <p>Falls sich die App nicht automatisch öffnet, klicke auf den Button:</p>
        <a id="app-link" href="#" class="btn">In Modrinth-App öffnen</a>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const mod = params.get('mod');

        if (mod) {
            // Mod-Name absichern
            const cleanMod = encodeURIComponent(mod);
            const targetUri = "modrinth://mod/" + cleanMod;

            // Link auf dem Button setzen
            document.getElementById('app-link').href = targetUri;

            // Automatischen Aufruf versuchen
            window.location.href = targetUri;
        } else {
            // Anzeige, falls kein ?mod= angegeben wurde
            document.getElementById('content').innerHTML = `
                <h2>Keine Mod angegeben!</h2>
                <p>Nutze den Link mit Parameter, z. B. <code>?mod=lolsu</code></p>
            `;
        }
    </script>
</body>
</html>
